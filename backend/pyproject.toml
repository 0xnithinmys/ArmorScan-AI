[tool.ruff]
target-version = "py312"
line-length = 100
select = ["E", "W", "F", "I", "UP", "B", "C4", "PIE", "RET", "SIM"]
ignore = ["E501"]

[tool.ruff.isort]
known-first-party = ["app"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.mypy]
python_version = "3.12"
strict = false
ignore_missing_imports = true
